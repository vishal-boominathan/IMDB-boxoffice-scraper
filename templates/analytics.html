<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Analytics</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
rel="stylesheet">

<style>

body{
background:#0f0e17;
font-family:Poppins,sans-serif;
}

</style>

</head>

<body class="text-white">

<div class="max-w-7xl mx-auto p-10">

<div class="flex justify-between items-center mb-10">

<div>

<h1 class="text-4xl font-black">

Analytics Dashboard

</h1>

<p class="text-gray-500">

IMDb Box Office Statistics

</p>

</div>

<a href="/"
class="bg-yellow-400 text-black px-5 py-3 rounded-xl font-bold">

← Dashboard

</a>

</div>

<div class="grid grid-cols-3 gap-6">

<div class="bg-[#171523] rounded-3xl p-6">

<p class="text-gray-500 text-xs uppercase">

Movies

</p>

<h2 class="text-4xl font-black mt-4">

{{ total_movies }}

</h2>

</div>

<div class="bg-[#171523] rounded-3xl p-6">

<p class="text-gray-500 text-xs uppercase">

Top Movie

</p>

<h2 class="text-2xl text-yellow-400 font-bold mt-4">

{{ top_movie }}

</h2>

</div>

<div class="bg-[#171523] rounded-3xl p-6">

<p class="text-gray-500 text-xs uppercase">

Weekend Gross

</p>

<h2 class="text-3xl text-purple-400 font-black mt-4">

{{ top_weekend }}

</h2>

</div>

</div>

<div class="bg-[#171523] rounded-3xl p-8 mt-8">

<h2 class="text-2xl font-bold mb-6">

Weekend Gross Chart

</h2>

<canvas id="weekendChart"></canvas>

</div>

<div class="bg-[#171523] rounded-3xl p-8 mt-8">

<h2 class="text-2xl font-bold mb-6">

Total Gross Chart

</h2>

<canvas id="totalChart"></canvas>

</div>

</div>

<script>

const labels={{ chart_labels|tojson }};

new Chart(document.getElementById("weekendChart"),{

type:"bar",

data:{

labels:labels,

datasets:[{

data:{{ chart_weekend_values|tojson }},

backgroundColor:"#FACC15"

}]

},

options:{

plugins:{legend:{display:false}}

}

});

new Chart(document.getElementById("totalChart"),{

type:"line",

data:{

labels:labels,

datasets:[{

data:{{ chart_total_values|tojson }},

borderColor:"#A855F7",

fill:false

}]

},

options:{

plugins:{legend:{display:false}}

}

});

</script>

</body>

</html>
