<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IMDb US Top 10 Box Office</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#0f0f0f;
    color:white;
}

.container{
    margin-top:40px;
}

h1{
    color:#f5c518;
    font-weight:bold;
}

.card{
    background:#1b1b1b;
    border:none;
    border-radius:12px;
}

.table{
    color:white;
}

.table-dark{
    background:#1b1b1b;
}

thead{
    background:#f5c518;
    color:black;
}

.btn-warning{
    font-weight:bold;
}

.rank{
    font-weight:bold;
    color:#f5c518;
}

</style>

</head>

<body>

<div class="container">

<div class="d-flex justify-content-between align-items-center mb-4">

<h1>IMDb US Top 10 Box Office</h1>

<a href="/refresh" class="btn btn-warning">
Refresh Data
</a>

</div>

<div class="card shadow">

<div class="card-body">

<table class="table table-dark table-hover align-middle">

<thead>

<tr>

<th>Position</th>

<th>Movie Name</th>

<th>Weekend Gross</th>

<th>Total Gross</th>

<th>Weeks Open</th>

</tr>

</thead>

<tbody>

{% for movie in movies %}

<tr>

<td class="rank">{{ movie[0] }}</td>

<td>{{ movie[1] }}</td>

<td>{{ movie[2] }}</td>

<td>{{ movie[3] }}</td>

<td>{{ movie[4] }}</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</div>

</div>

</body>

</html>
